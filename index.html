<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praxis · NBCOT OTR prep</title>
  <meta name="description" content="A calm, focused study companion for the NBCOT OTR board exam." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="topbar">
    <a class="brand" href="#/" aria-label="Praxis home">
      <span class="brand-mark"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M3 12h3l2 6 4-14 3 10 2-4h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="brand-name">Praxis</span>
      <span class="brand-sub">· NBCOT OTR prep</span>
    </a>
    <div class="topbar-right">
      <span class="streak" id="streak-pill" title="Days studied in a row">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M12 3c1 3 4 4 4 8a4 4 0 0 1-8 0c0-1 .5-2 1-2.5C9 10 9 12 9 12S8 8 12 3z" fill="currentColor"/></svg>
        <span id="streak-count">0</span>&nbsp;day streak
      </span>
    </div>
  </header>

  <main id="app" class="app" tabindex="-1">
    <noscript>
      <div class="noscript">Praxis needs JavaScript enabled to run. Please turn it on and reload.</div>
    </noscript>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="data/cases.js"></script>
  <script src="data/questions.js"></script>
  <script src="data/flashcards.js"></script>
  <script src="data/notes.js"></script>
  <script src="js/modes/cases.js"></script>
  <script src="js/modes/questions.js"></script>
  <script src="js/modes/flashcards.js"></script>
  <script src="js/modes/review.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
